<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能课程架构师 - 安俭钊的作品</title>
    <link rel="stylesheet" href="../../assets/global.css">
    <link rel="stylesheet" href="../../assets/navbar.css">
    <style>
        :root {
            --primary-color: #2c5282;
            --secondary-color: #edf2f7;
            --background-color: #f7fafc;
            --text-color: #2d3748;
            --heading-color: #1a202c;
            --white-color: #ffffff;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body{ background-color: var(--background-color); }
        .container{ max-width: 900px; margin: 0 auto; padding: 24px; }

        .header{ text-align:center; margin-bottom:40px; }
        .header h1{ color:var(--heading-color); font-size:2.5em; margin-bottom:10px; }
        .header p{ font-size:1.1em; color:#718096; max-width:600px; margin:0 auto; }

        .input-section{ display:flex; gap:10px; margin-bottom:40px; background:var(--white-color); padding:20px; border-radius:12px; box-shadow:var(--shadow); }

        #course-topic-input{ flex-grow:1; border:2px solid var(--border-color); border-radius:8px; padding:15px; font-size:1.1em; transition:border-color .3s, box-shadow .3s; }
        #course-topic-input:hover{ border-color:#cbd5e0; }
        #course-topic-input:focus{ outline:none; border-color:var(--primary-color); box-shadow:0 0 0 3px rgba(44,82,130,.2); }

        #generate-btn{ border:none; background-color:var(--primary-color); color:var(--white-color); padding:0 30px; font-size:1.1em; font-weight:600; border-radius:8px; cursor:pointer; transition:background-color .3s, transform .2s; }
        #generate-btn:hover{ background-color:#1a365d; }
        #generate-btn:active{ transform:scale(.98); }
        #generate-btn:disabled{ background-color:#a0aec0; cursor:not-allowed; opacity:.8; }

        #loader{ text-align:center; padding:40px; font-size:1.1em; color:#718096; }
        .loading-wrap{ display:inline-flex; align-items:center; gap:12px; }
        .spinner{ width:24px; height:24px; border:3px solid #cbd5e0; border-top-color:var(--primary-color); border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin{ to{ transform:rotate(360deg); } }
        .dots{ display:inline-flex; gap:4px; }
        .dot{ width:6px; height:6px; border-radius:50%; background:#a0aec0; animation:bounce 1.2s ease-in-out infinite; }
        .dot:nth-child(2){ animation-delay:.2s; }
        .dot:nth-child(3){ animation-delay:.4s; }
        @keyframes bounce{ 0%,80%,100{ transform:translateY(0); opacity:.6; } 40%{ transform:translateY(-6px); opacity:1; } }

        #result-container{ background:var(--white-color); border-radius:12px; box-shadow:var(--shadow); padding:40px; }
        .result-section{ margin-bottom:30px; border-bottom:1px solid var(--border-color); padding-bottom:20px; }
        .result-section:last-child{ border-bottom:none; margin-bottom:0; padding-bottom:0; }
        .result-section h2{ color:var(--primary-color); font-size:1.5em; margin-bottom:15px; }
        .result-section h3{ color:var(--heading-color); font-size:1.25em; margin-top:20px; margin-bottom:10px; }
        ul,ol{ padding-left:22px; }
        li{ margin-bottom:10px; line-height:1.7; }
        .module{ background-color:var(--secondary-color); padding:20px; border-radius:8px; margin-bottom:20px; border-left:4px solid var(--primary-color); }

        @media (max-width:640px){
          .header h1{ font-size:2em; }
          .header p{ font-size:1em; }
          .container{ padding:12px; }
          .input-section{ flex-direction:column; gap:12px; }
          #course-topic-input{ font-size:1em; padding:12px; }
          #generate-btn{ width:100%; padding:12px 20px; font-size:1em; }
          #result-container{ padding:24px; }
        }
    </style>
</head>
<body>
  <nav class="navbar" aria-label="主导航">
    <div class="nav-inner">
      <div class="brand">Darwin · AI Education</div>
      <button class="hamburger" aria-label="展开导航">
        <span></span><span></span><span></span>
      </button>
      <div class="links">
        <a href="/">首页</a>
        <a href="/thought/khanmigo_review.html">Khanmigo 深度剖析</a>
        <a href="/practice/index.html">苏格拉底机器人</a>
        <a href="/vision/index.html">智能课程架构师</a>
      </div>
    </div>
  </nav>

    <div class="container">
        <header class="header">
            <h1>智能课程架构师</h1>
            <p>输入一个你想教授的主题，AI 将为你生成一份专业、完整的课程大纲，助你开启教学设计的第一步。</p>
        </header>
    
        <section class="input-section">
            <input type="text" id="course-topic-input" placeholder="例如：给10岁孩子讲量子力学">
            <button id="generate-btn">生成大纲</button>
        </section>
    
        <section id="loader" style="display: none;">
            <div class="loading-wrap">
              <div class="spinner" aria-hidden="true"></div>
              <div aria-live="polite" aria-busy="true">正在生成课程大纲 <span class="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>
            </div>
        </section>
    
        <section id="result-container" style="display: none;"></section>
    </div>
    
    <script>
      const topicInput = document.getElementById('course-topic-input');
      const generateBtn = document.getElementById('generate-btn');
      const loader = document.getElementById('loader');
      const resultContainer = document.getElementById('result-container');

      function showLoader(){ loader.style.display='block'; }
      function hideLoader(){ loader.style.display='none'; }
      function clearResult(){ resultContainer.innerHTML=''; }
      function hideResult(){ resultContainer.style.display='none'; }
      function showResult(){ resultContainer.style.display='block'; }

      function renderResult(data){
        clearResult();
        const { courseTitle, modules=[] } = data || {};
        const titleSection = document.createElement('div');
        titleSection.className = 'result-section';
        titleSection.innerHTML = `<h2>课程标题</h2><p>${courseTitle || '未命名课程'}</p>`;
        resultContainer.appendChild(titleSection);

        const modulesSection = document.createElement('div');
        modulesSection.className = 'result-section';
        modulesSection.innerHTML = `<h2>课程模块</h2>`;
        resultContainer.appendChild(modulesSection);

        modules.forEach((m, idx) => {
          const mod = document.createElement('div');
          mod.className = 'module';
          const safeTitle = m.title || `模块 ${idx+1}`;
          const points = Array.isArray(m.points) ? m.points : [];
          const listHtml = points.map(pt => `<li>${pt}</li>`).join('');
          mod.innerHTML = `<h3>${safeTitle}</h3><ul>${listHtml}</ul>`;
          modulesSection.appendChild(mod);
        });
      }

      async function handleGenerate(){
        const topic = (topicInput.value || '').trim();
        if(!topic) return;
        generateBtn.disabled = true;
        topicInput.disabled = true;
        showLoader(); hideResult();

        const payload = { topic };
        let resultData;
        try{
          const resp = await fetch('/api/generate_course', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
          });
          if(!resp.ok) throw new Error('Bad response');
          resultData = await resp.json();
        }catch(e){
          await new Promise(r => setTimeout(r, 1200));
          resultData = {
            courseTitle: `${topic}（示例大纲）`,
            modules: [
              { title:'模块1：破冰与概念直觉', points:['用生活中的例子引出微观世界概念','让孩子对“不确定性”产生兴趣'] },
              { title:'模块2：核心理念精讲', points:['用比喻解释波粒二象性','引导孩子理解量子叠加现象'] }
            ]
          };
        }

        hideLoader(); renderResult(resultData); showResult();
        generateBtn.disabled=false; topicInput.disabled=false; topicInput.focus();
      }

      generateBtn.addEventListener('click', handleGenerate);
      topicInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.preventDefault(); handleGenerate(); }});
      const toggleBtnDisabled = () => { const empty = !(topicInput.value || '').trim(); generateBtn.disabled = empty; };
      topicInput.addEventListener('input', toggleBtnDisabled);
      toggleBtnDisabled();
    </script>
    <script src="../../assets/common.js"></script>
</body>
</html>
